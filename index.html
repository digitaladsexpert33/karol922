  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Inter',sans-serif;
      background:#FAFAFA;
      color:#1E293B;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow-x:hidden;
      position:relative;
    }
    a{text-decoration:none;color:inherit;}

    /* Subtle bg texture */
    .grid-dots{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(circle,rgba(0,0,0,.03) 1px,transparent 1px);
      background-size:30px 30px;
      animation:gridShift 30s linear infinite;
    }
    @keyframes gridShift{
      0%{background-position:0 0;}
      100%{background-position:30px 30px;}
    }

    /* Soft warm blob */
    .blob{
      position:fixed;border-radius:50%;
      filter:blur(100px);opacity:.2;
      pointer-events:none;z-index:0;
    }
    .blob-1{
      width:340px;height:340px;
      background:radial-gradient(circle,rgba(168,162,158,.3),transparent 70%);
      top:-8%;left:-5%;
      animation:blobA 22s ease-in-out infinite alternate;
    }
    .blob-2{
      width:280px;height:280px;
      background:radial-gradient(circle,rgba(148,163,184,.2),transparent 70%);
      bottom:-6%;right:-4%;
      animation:blobB 26s ease-in-out infinite alternate;
    }
    @keyframes blobA{to{transform:translate(60px,40px) scale(1.08);}}
    @keyframes blobB{to{transform:translate(-40px,-30px) scale(1.05);}}

    /* Floating dots */
    .shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .dot-float{
      position:absolute;
      width:4px;height:4px;
      border-radius:50%;
      background:rgba(0,0,0,.06);
      animation:dotUp linear infinite;
    }
    .dot-float:nth-child(1){left:12%;animation-duration:18s;animation-delay:0s;}
    .dot-float:nth-child(2){left:30%;animation-duration:22s;animation-delay:-4s;width:3px;height:3px;}
    .dot-float:nth-child(3){left:55%;animation-duration:20s;animation-delay:-8s;width:5px;height:5px;}
    .dot-float:nth-child(4){left:75%;animation-duration:24s;animation-delay:-2s;}
    .dot-float:nth-child(5){left:90%;animation-duration:19s;animation-delay:-11s;width:3px;height:3px;}
    .dot-float:nth-child(6){left:45%;animation-duration:21s;animation-delay:-6s;width:5px;height:5px;}
    @keyframes dotUp{
      0%{transform:translateY(100vh);opacity:0;}
      10%{opacity:1;}
      90%{opacity:1;}
      100%{transform:translateY(-10vh);opacity:0;}
    }

    /* ===== CONTENT ===== */
    .center{
      position:relative;z-index:2;
      text-align:center;
      padding:40px 24px;
      max-width:400px;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* Logo */
    .logo-wrap{
      margin-bottom:28px;
      animation:logoPop .6s .1s cubic-bezier(.34,1.56,.64,1) both;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    @keyframes logoPop{
      from{opacity:0;transform:scale(.7);}
      to{opacity:1;transform:scale(1);}
    }

    .logo-img{
      width:88px;height:88px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #fff;
      box-shadow:0 4px 20px rgba(0,0,0,.08);
      position:relative;z-index:1;
      background:#E2E8F0;
    }

    .logo-fallback{
      width:88px;height:88px;
      border-radius:50%;
      background:#1E293B;
      display:none;
      align-items:center;
      justify-content:center;
      font-size:32px;font-weight:800;color:#fff;
      letter-spacing:-1px;
      border:3px solid #fff;
      box-shadow:0 4px 20px rgba(0,0,0,.08);
      position:relative;z-index:1;
    }

    h1{
      font-size:clamp(22px,5.5vw,30px);
      font-weight:800;
      line-height:1.2;
      letter-spacing:-0.02em;
      margin-bottom:10px;
      color:#0F172A;
      animation:fadeUp .6s .2s ease both;
    }

    .sub{
      color:#94A3B8;
      font-size:clamp(13px,3.2vw,15px);
      line-height:1.6;
      margin-bottom:32px;
      max-width:300px;
      animation:fadeUp .6s .25s ease both;
    }

    /* Link button */
    .link-btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:13px 28px;border-radius:12px;
      background:#1E293B;color:#fff;
      font-family:'Inter',sans-serif;
      font-weight:600;font-size:14px;
      border:none;cursor:pointer;
      transition:background .2s,transform .15s,box-shadow .15s;
      box-shadow:0 2px 12px rgba(0,0,0,.06);
      animation:fadeUp .6s .3s ease both;
    }
    .link-btn:hover{
      background:#334155;
      transform:translateY(-1px);
      box-shadow:0 4px 16px rgba(0,0,0,.1);
    }
    .link-btn:active{transform:scale(.98);}
    .link-btn img{
      width:18px;height:18px;border-radius:4px;
      object-fit:contain;filter:brightness(0) invert(1);opacity:.9;
    }

    /* Footer */
    .foot{
      position:relative;z-index:2;
      text-align:center;
      padding:20px 24px 28px;
      animation:fadeUp .6s .4s ease both;
    }
    .foot p{
      font-size:10px;color:#CBD5E1;
      line-height:1.7;max-width:320px;margin:0 auto;
    }
    .foot-links{
      display:flex;justify-content:center;gap:14px;
      margin-bottom:8px;
    }
    .foot-links a{
      font-size:10px;color:#94A3B8;
      transition:color .2s;
    }
    .foot-links a:hover{color:#64748B;}

    @media(max-width:600px){
      .center{padding:50px 20px 20px;}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{
        animation-duration:.01ms!important;
        animation-iteration-count:1!important;
        transition-duration:.02ms!important;
      }
    }
  </style>
</head>
<body>

<div class="grid-dots" aria-hidden="true"></div>
<div class="blob blob-1" aria-hidden="true"></div>
<div class="blob blob-2" aria-hidden="true"></div>
<div class="shapes" aria-hidden="true">
  <div class="dot-float"></div>
  <div class="dot-float"></div>
  <div class="dot-float"></div>
  <div class="dot-float"></div>
  <div class="dot-float"></div>
  <div class="dot-float"></div>

  <h1>Karool</h1>
  <p class="sub">Charts, context, conversations — join the community on Telegram.</p>

    Telegram

  <div class="foot-links">

  </div>
  <p>Educational purposes only.</p>
</div>

});
</script>
</body>
</html>
